<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼천리 SL&C 온보딩 가이드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8f8f6;
            --card-bg: #ffffff;
            --text-main: #1a2744;
            --text-muted: #555555;
            --accent-teal: #0e6e6e;
            --accent-amber: #c8892a;
            --accent-coral: #c85a3a;
            --border-color: #e8e4dc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vi;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .brand-tags {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        /* 인증 전 안내문 */
        .auth-box {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .auth-box p {
            font-size: 13px;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 14px;
            text-align: center;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: var(--accent-teal);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-teal);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #0b5555; }

        /* 인증 후 메뉴 링크 (초기에는 숨김) */
        .main-menu {
            display: none;
            margin-top: 20px;
            text-align: left;
        }

        .menu-item {
            display: block;
            padding: 16px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            margin-bottom: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .menu-item:hover {
            border-color: var(--accent-amber);
            background: #fffdf9;
        }

        .menu-item span {
            font-size: 12px;
            display: block;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <span>삼천리 SL&C 외식사업부</span>
    <h1>환영합니다, 슬릭크루.</h1>
    <p class="subtitle">따뜻한 사람 중심의 일터, 삼천리에서 함께 일하게 되어 기쁩니다.</p>

    <div class="brand-tags">
        <span class="tag">호우섬</span>
        <span class="tag">Chai 797</span>
        <span class="tag">정육점</span>
        <span class="tag">이타마에 스시</span>
    </div>

    <div id="authBox" class="auth-box">
        <p>안내받으신 매장별 고유 코드를 입력해 주세요.</p>
        <input type="password" id="storeCode" placeholder="매장 코드 입력">
        <button onclick="checkCode()">입장하기</button>
    </div>

    <div id="mainMenu" class="main-menu">
        <p style="font-size: 13px; margin-bottom: 15px; color: var(--accent-teal); font-weight: bold; text-align: center;">✓ 인증 완료! 이동할 페이지를 선택하세요.</p>
        <a href="about.html" class="menu-item">
            <span>Company Profile</span>
            🏢 삼천리 SL&C 회사 소개 보기
        </a>
        <a href="3do9gyeong.html" class="menu-item">
            <span>Core Value</span>
            📌 3도 9경 행동강령 카드 보기
        </a>
        <a href="journey.html" class="menu-item">
            <span>Onboarding Roadmap</span>
            🏃‍♂️ 90일 온보딩 여정 & 체크리스트
        </a>
        <a href="voe.html" class="menu-item">
            <span>Voice of Employee</span>
            💬 현장의 소리 (VOE) 제출하기
        </a>
    </div>
</div>

<script>
    // 임시 코드 설정 (원하는 코드로 변경 가능)
    const CORRECT_CODE = "samchully2026";

    function checkCode() {
        const inputCode = document.getElementById("storeCode").value;
        if(inputCode === CORRECT_CODE) {
            document.getElementById("authBox").style.display = "none";
            document.getElementById("mainMenu").style.display = "block";
            // 브라우저 세션에 인증 상태 저장 (다른 페이지 이동 시 활용 가능)
            sessionStorage.setItem("slc_authenticated", "true");
        } else {
            alert("코드가 일치하지 않습니다. 매장 점장님께 문의해 주세요.");
        }
    }

    // 이미 이전 페이지에서 인증했다면 바로 메뉴 보여주기
    window.onload = function() {
        if(sessionStorage.getItem("slc_authenticated") === "true") {
            document.getElementById("authBox").style.display = "none";
            document.getElementById("mainMenu").style.display = "block";
        }
    }
</script>

</body>
</html>
